---
apiVersion: launchpad.sky.uk/v1alpha1
kind: Gateway
metadata:
  name: hey-api-test-server
spec:
  realms:
    - name: ping
      auth: none
      allowInternet: false
      allowOnPrem: true
      routes:
        - path: / # https://hey-api-test-server.internal.test.adtechplatform.sky.com/
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS

  services:
    - name: hey-api-test-server
      port: 3000
