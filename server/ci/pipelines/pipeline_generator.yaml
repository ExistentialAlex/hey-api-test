---
resource_types:
  - name: github-webhook-resource
    type: docker-image
    source:
      repository: europe-west1-docker.pkg.dev/uk-cti-adtech-platform-prod/adtech-platform-shared/jingkaihe/github-webhook-resource
      tag: 1.4.2
      username: _json_key
      password: |
        ((hey-api-test-keyfile.keyfile))

resources:
  - name: hey-api-test-server
    type: git
    icon: github
    webhook_token: ((hey-api-test-server-webhook-token))
    source:
      uri: https://github.com/sky-uk/hey-api-test
      paths:
        - server
      branch: main
      fetch_tags: true
      username: svc-adtech-cicd-bot
      password: ((github_pat))
  - name: hey-api-test-server-webhook
    type: github-webhook-resource
    source:
      github_api: https://api.github.com
      github_token: ((github_pat))
  - name: hey-api-test-server-pr-webhook
    type: github-webhook-resource
    source:
      github_api: https://api.github.com
      github_token: ((github_pat))
  - name: hey-api-test-server-self-webhook
    type: github-webhook-resource
    source:
      github_api: https://api.github.com
      github_token: ((github_pat))

jobs:
  - name: hey-api-test-server-set-self
    plan:
      - get: hey-api-test-server
        trigger: true
      - set_pipeline: hey-api-test-server-generator
        file: hey-api-test-server/server/ci/pipelines/pipeline_generator.yaml
      - put: create-webhook
        resource: hey-api-test-server-self-webhook
        params:
          org: sky-uk
          repo: hey-api-test
          resource_name: hey-api-test-server
          webhook_token: ((hey-api-test-server-webhook-token))
          operation: create
          events: [push]
          pipeline: hey-api-test-server-generator

  - name: hey-api-test-server-pipelines
    plan:
      - get: hey-api-test-server
        trigger: true
        passed: [hey-api-test-server-set-self]
      - set_pipeline: hey-api-test-server-pr
        file: hey-api-test-server/server/ci/pipelines/check.yaml
      - set_pipeline: hey-api-test-server-deploy
        file: hey-api-test-server/server/ci/pipelines/deploy.yaml
      - put: create-webhook
        resource: hey-api-test-server-webhook
        params:
          org: sky-uk
          repo: hey-api-test
          resource_name: hey-api-test-server
          webhook_token: ((hey-api-test-server-webhook-token))
          operation: create
          events: [push]
          pipeline: hey-api-test-server-deploy
      - put: create-webhook-pr
        resource: hey-api-test-server-pr-webhook
        params:
          org: sky-uk
          repo: hey-api-test
          resource_name: hey-api-test-server-pr
          webhook_token: ((hey-api-test-server-webhook-token))
          operation: create
          events: [pull_request]
          pipeline: hey-api-test-server-pr
